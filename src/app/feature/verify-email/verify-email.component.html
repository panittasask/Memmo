<section class="info-page">
  <div class="info-card">
    <!-- Loading -->
    <ng-container *ngIf="status === 'loading'">
      <div class="icon-wrap loading">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
      </div>
      <h1>กำลังยืนยันอีเมล...</h1>
      <p>กรุณารอสักครู่</p>
    </ng-container>

    <!-- Success -->
    <ng-container *ngIf="status === 'success'">
      <div class="icon-wrap success">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      <h1>ยืนยันอีเมลสำเร็จ!</h1>
      <p>บัญชีของคุณพร้อมใช้งานแล้ว กำลังพาคุณไปยังหน้าหลัก...</p>
    </ng-container>

    <!-- Error -->
    <ng-container *ngIf="status === 'error'">
      <div class="icon-wrap error">
        <i class="fa-solid fa-circle-xmark"></i>
      </div>
      <h1>ยืนยันอีเมลไม่สำเร็จ</h1>
      <p>{{ errorMessage }}</p>
      <button class="btn-back" (click)="goToLogin()">กลับไปหน้า Login</button>
    </ng-container>
  </div>
</section>
