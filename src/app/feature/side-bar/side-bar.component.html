<div class="mobile-top-bar">
  <button
    type="button"
    class="mobile-menu-button"
    (click)="toggleMobileMenu()"
    aria-label="Toggle menu"
    [attr.aria-expanded]="isMobileMenuOpen"
  >
    <i
      class="fa-solid"
      [class.fa-bars]="!isMobileMenuOpen"
      [class.fa-xmark]="isMobileMenuOpen"
    ></i>
  </button>
  <div class="mobile-title">
    <i class="fa-solid fa-book"></i>
    <span>Memo Me</span>
  </div>
  <button
    type="button"
    class="mobile-add-button"
    (click)="onAddNew()"
    aria-label="เพิ่มงานใหม่"
  >
    <i class="fa-solid fa-plus"></i>
  </button>
</div>

<button
  type="button"
  class="mobile-menu-overlay"
  [class.is-show]="isMobileMenuOpen"
  (click)="closeMobileMenu()"
  aria-label="Close menu"
></button>

<div class="side-bar-container" [class.mobile-open]="isMobileMenuOpen">
  <div class="side-bar-item">
    <i style="font-size: 25px" class="fa-solid fa-book"></i>
    <span style="margin-left: 10px">Memo Me</span>
  </div>
  <div
    [class.active]="currentRoute === 'summary'"
    class="side-bar-item"
    (click)="navigate('summary')"
  >
    <i class="menu-icon fa-solid fa-gauge-high"></i>
    <span class="menu-label">แดชบอร์ด</span>
  </div>
  <!-- <div
    [class.active]="currentRoute === 'today-entry'"
    class="side-bar-item"
    (click)="navigate('today-entry')"
  >
    Today's Entry
  </div> -->
  <div
    [class.active]="currentRoute === 'history'"
    class="side-bar-item"
    (click)="navigate('history')"
  >
    <i class="menu-icon fa-solid fa-clock-rotate-left"></i>
    <span class="menu-label">ประวัติ</span>
  </div>
  <div
    [class.active]="currentRoute === 'settings'"
    class="side-bar-item"
    (click)="navigate('settings')"
  >
    <i class="menu-icon fa-solid fa-gear"></i>
    <span class="menu-label">การตั้งค่า</span>
  </div>
  <div
    [class.active]="currentRoute === 'analytics'"
    class="side-bar-item"
    (click)="navigate('analytics')"
  >
    <i class="menu-icon fa-solid fa-chart-line"></i>
    <span class="menu-label">วิเคราะห์</span>
  </div>
  <div
    [class.active]="currentRoute === 'workflow'"
    class="side-bar-item"
    (click)="navigate('workflow')"
  >
    <i class="menu-icon fa-solid fa-diagram-project"></i>
    <span class="menu-label">เวิร์กโฟลว์</span>
  </div>
  <!-- <div class="search-box-container">
     <input class="search-box" placeholder="ค้นหา..." />
  </div> -->
  <div class="quick-add">
    <button (click)="onAddNew()" class="quick-add-new-button">+</button>
  </div>
  <!-- <div class="profile">
    <img class="profile-image" src="/assets/images/SnowyOwl.jpg" alt="" />
  </div> -->
</div>
<div [class.isShow]="isAddNew" class="add-new-container">
  <div [formGroup]="formAddNew" class="add-new-content">
    <div class="header-content">เพิ่ม Task งานใหม่</div>
    <div class="close-icon">
      <i class="fa-solid fa-xmark" (click)="isAddNew = false"></i>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>วันที่</label>
        <app-datepicker formControlName="date"></app-datepicker>
      </div>
      <div class="input-container-content">
        <label>เวลาเริ่มต้น</label>
        <app-time-picker formControlName="startTime"></app-time-picker>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>ระยะเวลา</label>
        <input
          style="height: 36px"
          formControlName="time"
          type="number"
          class="form-input"
        />
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>Project</label>
        <app-dropdown-list
          [value]="formAddNew.controls.projectName.value ?? null"
          [options]="projectOptionNames"
          placeholder="-- เลือก Project --"
          (valueChange)="
            formAddNew.controls.projectName.setValue($event.toString())
          "
        ></app-dropdown-list>
      </div>
      <div class="input-container-content">
        <label>Status</label>
        <app-dropdown-list
          [value]="formAddNew.controls.status.value ?? null"
          [options]="statusOptionNames"
          placeholder="-- เลือก Status --"
          (valueChange)="formAddNew.controls.status.setValue($event.toString())"
        ></app-dropdown-list>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>Task</label>
        <input formControlName="taskName" type="text" class="form-input" />
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>รายละเอียด</label>
        <textarea
          formControlName="description"
          type="text"
          class="form-input"
        ></textarea>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>Link URL</label>
        <input
          formControlName="hyperlink"
          type="url"
          class="form-input"
          placeholder="https://..."
        />
      </div>
    </div>
    <div class="button-wrapper">
      <button
        type="submit"
        class="btn-save"
        [disabled]="formAddNew.invalid || saveInProcess"
        (click)="onSave()"
      >
        บันทึกข้อมูล
      </button>
    </div>
  </div>
</div>
