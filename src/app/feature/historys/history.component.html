<div class="history-container">
  <div class="main-history-container">
    <div class="header">
      <div class="header-title-group">
        <div class="title">ประวัติรายการ</div>
        <div class="subtitle">ค้นหาและดูข้อมูลตามวันที่</div>
      </div>
      <div class="header-filter-group">
        <label for="history-date-filter">วันที่</label>
        <div class="filter-control">
          <app-datepicker
            [ngModel]="filterDate"
            (ngModelChange)="onFilterDateChange($event)"
            placeholder="เลือกวันที่"
          ></app-datepicker>
          <app-dropdown-list
            [value]="selectedStatus"
            [options]="statusFilterOptions"
            placeholder="-- เลือกสถานะ --"
            (valueChange)="onStatusFilterChange($event)"
          ></app-dropdown-list>
          <button
            type="button"
            class="btn-filter btn-today"
            [class.active]="!isAllFilter"
            (click)="setTodayFilter()"
          >
            วันนี้
          </button>
          <button
            type="button"
            class="btn-filter btn-all"
            [class.active]="isAllFilter"
            (click)="setAllFilter()"
          >
            ทั้งหมด
          </button>
        </div>
      </div>
    </div>
    <div class="body">
      <app-grid-item
        [data]="data"
        [columns]="columns"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        [totalCount]="totalCount"
        [hasNextPage]="hasNextPage"
        [pageSize]="pageSize"
        [pageSizeOptions]="pageSizeOptions"
        (selectedClick)="selectedItem($event)"
        (cloneClick)="cloneItem($event)"
        (removeClick)="deleteItem($event)"
        (pageChange)="onPageChange($event)"
      ></app-grid-item>
    </div>
  </div>
  <div
    [class.is-show]="isShowDetail"
    class="detail-history-container"
    [formGroup]="formUpdate"
  >
    <div class="header-history-container">
      <div class="header-content">Update Task</div>
      <div class="close-icon">
        <i class="fa-solid fa-xmark" (click)="isShowDetail = false"></i>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>วันที่</label>
        <app-datepicker formControlName="date"></app-datepicker>
      </div>
      <div class="input-container-content">
        <label>ระยะเวลา</label>
        <input
          formControlName="time"
          type="number"
          class="form-input time-input"
        />
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>Project</label>
        <app-dropdown-list
          [value]="formUpdate.controls.projectName.value ?? null"
          [options]="projectOptionNames"
          placeholder="-- เลือก Project --"
          (valueChange)="
            formUpdate.controls.projectName.setValue($event.toString())
          "
        ></app-dropdown-list>
      </div>
      <div class="input-container-content">
        <label>Status</label>
        <app-dropdown-list
          [value]="formUpdate.controls.status.value ?? null"
          [options]="statusOptionNames"
          placeholder="-- เลือก Status --"
          (valueChange)="formUpdate.controls.status.setValue($event.toString())"
        ></app-dropdown-list>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>Task</label>
        <input formControlName="taskName" type="text" class="form-input" />
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content focus-task-check">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isFocusTask" />
          Focus Task
        </label>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>รายละเอียด</label>
        <textarea
          formControlName="description"
          type="text"
          class="form-input"
        ></textarea>
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label>ลิงค์</label>
        <input
          formControlName="hyperlink"
          type="url"
          class="form-input"
          placeholder="https://example.com"
        />
      </div>
    </div>
    <div class="button-wrapper">
      <button
        type="submit"
        class="btn-save"
        [disabled]="formUpdate.invalid || saveInProcess"
        (click)="onSave()"
      >
        บันทึกข้อมูล
      </button>
    </div>
  </div>
</div>
<div [class.back-drop]="isShowDetail"></div>
