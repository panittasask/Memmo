<div class="history-container">
  <div class="main-history-container">
    <div class="header">
      <div class="header-title-group">
        <div class="title">ประวัติรายการ</div>
        <div class="subtitle">ค้นหาและดูข้อมูลตามวันที่</div>
      </div>
      <div class="header-filter-group">
        <label for="history-date-filter">วันที่</label>
        <div class="filter-control">
          <input
            id="history-date-filter"
            type="date"
            class="date-filter-input"
            [ngModel]="filterDate"
            (ngModelChange)="onFilterDateChange($event)"
          >
          <button type="button" class="btn-filter btn-today" [class.active]="!isAllFilter" (click)="setTodayFilter()">วันนี้</button>
          <button type="button" class="btn-filter btn-all" [class.active]="isAllFilter" (click)="setAllFilter()">ทั้งหมด</button>
        </div>
      </div>
    </div>
    <div class="body">
      <app-grid-item
        [data]="data"
        [columns]="columns"
        (selectedClick)="selectedItem($event)"
      ></app-grid-item>
    </div>
  </div>
  <div [class.is-show]="isShowDetail" class="detail-history-container" [formGroup]="formUpdate">
    <div class="header-history-container">
      <div class="header-content">Update Task</div>
            <div class="close-icon">
        <i class="fa-solid fa-xmark" (click)="isShowDetail = false"></i>
      </div>
    </div>
    <div class="content-container ">
        <div class="input-container-content">
          <label >วันที่</label>
          <input formControlName="date" type="date" class="form-input">
        </div>
        <div class="input-container-content">
          <label >ระยะเวลา</label>
          <input formControlName="time" type="number" class="form-input">
        </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label >Project</label>
        <input formControlName="projectName" type="text" class="form-input">
      </div>
      <div class="input-container-content">
        <label >Status</label>
        <input formControlName="status" type="text" class="form-input">
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label >Task</label>
        <input formControlName="taskName" type="text" class="form-input">
      </div>
    </div>
    <div class="content-container">
      <div class="input-container-content">
        <label >รายละเอียด</label>
        <textarea formControlName="description" type="text" class="form-input"></textarea>
      </div>
    </div>
    <div class="button-wrapper">
    <button 
      type="submit" 
      class="btn-save" 
      [disabled]="formUpdate.invalid"
      (click)="onSave()">
      บันทึกข้อมูล
  </button>
</div>
  </div>
  </div>
<div [class.back-drop]="isShowDetail">
  
</div>
