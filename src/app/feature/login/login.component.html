<section class="login-page">
  <!-- <div class="bg-shape shape-one"></div>
  <div class="bg-shape shape-two"></div> -->

  <div class="login-card">
    <div class="brand-row">
      <span class="logo-circle"><i class="fa-solid fa-book"></i></span>
      <div>
        <h1>Welcome Back</h1>
        <p>Sign in to continue your daily memo flow</p>
      </div>
    </div>

    <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label for="userName">Username</label>
      <input
        id="userName"
        type="text"
        formControlName="userName"
        placeholder="Enter your username"
      />
      <small class="error" [class.error--show]="userName.touched && userName.invalid">Username is required.</small>

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter your password"
      />
      <small class="error" [class.error--show]="password.touched && password.invalid">Password must be at least 6 characters.</small>

      <div class="row-between">
        <label class="remember" for="rememberMe">
          <input id="rememberMe" type="checkbox" formControlName="rememberMe" />
          Remember me
        </label>
        <a routerLink="/summary">Forgot password?</a>
      </div>

      <small class="error error--api" *ngIf="errorMessage">{{ errorMessage }}</small>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
      </button>

      <p class="auth-switch">
        New to Memmo?
        <a routerLink="/register">Create account</a>
      </p>
    </form>
  </div>
</section>
